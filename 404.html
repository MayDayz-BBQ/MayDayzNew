<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404! Smoke Got In Our Eyes | MayDayz Smokn BBQ</title>
    <meta name="theme-color" content="black">
    <link rel="icon" href="/src/assets/images/MAYDAYZ-FAV.png">

    <link rel="stylesheet" href="/src/css/output.css">
    <link rel="preload" href="/src/assets/images/MenuBackground.webp" as="image">
    <link rel="preload" href="/src/assets/images/mobileBackground.webp" as="image">

    <style>
        @font-face {
            font-family: FontB;
            src: url('/src/assets/Fonts/LTSuperior-SemiBold.otf');
            font-display: swap;
        }

        @font-face {
            font-family: FontC;
            src: url('/src/assets/Fonts/Ricebox-Allcaps.ttf');
            font-display: swap;
        }

        @font-face {
            font-family: FontA;
            src: url('/src/assets/Fonts/FIRES-PERSONAL-USE.ttf');
            font-display: swap;
        }

        .smoke-animation {
            animation: drift 10s infinite linear;
            filter: blur(8px);
            opacity: 0.3;
        }

        @keyframes drift {
            from {
                transform: translateX(-10%) translateY(0);
            }

            to {
                transform: translateX(10%) translateY(-20px);
            }
        }
    </style>
</head>

<body class="bg-black m-0 p-0 text-white min-h-screen flex flex-col">
    <picture>
        <source srcset="/src/assets/images/MenuBackground.webp" media="(min-width: 768px)">
        <img src="/src/assets/images/mobileBackground.webp" alt=""
            class="fixed inset-0 w-full h-full object-cover -z-10 bg-fixed opacity-80">
    </picture>

    <header class="sticky top-0 z-50 bg-black/60 backdrop-blur-md border-b border-white/10 p-4">
        <nav class="max-w-7xl mx-auto flex justify-center" style="font-family: FontC;">
            <a href="/" class="text-white uppercase transition-colors hover:text-red-500 text-xl">Back to Home</a>
        </nav>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center text-center px-4" style="font-family: FontB;">
        <div class="relative">
            <h1 class="text-[12rem] md:text-[15rem] leading-none text-white/10 select-none" style="font-family: FontC;">
                404</h1>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
                <picture>
                    <img src="/src/assets/Images/md-logo.webp" alt="MayDayz Logo"
                        class="w-32 md:w-48 mb-4 drop-shadow-2xl">
                </picture>
                <h2 class="text-3xl md:text-5xl uppercase text-red-600" style="font-family: FontC;">Smoke Screen!</h2>
            </div>
        </div>

        <p class="text-xl md:text-2xl text-gray-300 mt-8 max-w-lg">
            Looks like this page went up in flames. We couldn't find what you were looking for.
        </p>

        <div class="mt-12" style="font-family: FontC;">
            <a href="/"
                class="text-white text-2xl uppercase rounded-full bg-red-700 px-10 py-4 hover:bg-white hover:text-red-600 transition-all shadow-[0_0_20px_rgba(185,28,28,0.5)] transform hover:scale-105">
                Return to Pit
            </a>
        </div>
    </main>

    <footer class="bg-black/80 border-t border-gray-800 py-8 text-center text-xs text-gray-500">
        <p>© 2025 MayDayz Smokn BBQ. Grilling Perfection.</p>
    </footer>
</body>

</html>
