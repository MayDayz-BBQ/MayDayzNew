<script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker
                .register("/service-worker.js")
                .then((registration) => {
                    console.log(
                        "Service Worker registered with scope:",
                        "Service Worker registration initiated for unregistration:",
                        registration.scope
                    );
                })
                .catch((error) => {
                    console.error("Service Worker registration failed:", error);
                });
        });
    }
</script>
<script>
    window.onload = function () {
        hidePreloader();
    };

    // Failsafe: Hide preloader after 5 seconds even if everything hasn't loaded
    setTimeout(hidePreloader, 5000);

    function hidePreloader() {
        const preloader = document.getElementById('preloader');
        if (preloader) {
            preloader.classList.add('preloader-hidden');
            setTimeout(() => preloader.remove(), 500);
        }
    }</script>
<script>
    document.querySelectorAll('nav a').forEach(link => {
        link.addEventListener('mouseenter', () => {
            const linkHref = link.getAttribute('href');
            if (linkHref && linkHref.startsWith('/')) {
                const prefetchLink = document.createElement('link');
                prefetchLink.rel = 'prefetch';
                prefetchLink.href = linkHref;
                document.head.appendChild(prefetchLink);
            }
        }, { once: true });
    });
</script>
<script>
    const menu_button = document.getElementById("back-button");
    function loadIndex() {
        menu_button.addEventListener("mouseover", () => {
            const targetPath = "./index.html";

            // Prevent duplicate rules
            if (!document.getElementById("speculation-menu")) {
                const specScript = document.createElement('script');
                specScript.id = "speculation-menu";
                specScript.type = 'speculationrules';

                const specRules = {
                    "prerender": [
                        { "source": "list", "urls": [targetPath] }
                    ]
                };

                specScript.textContent = JSON.stringify(specRules);
                document.head.append(specScript);
                console.log(`Speculatively prerendering: ${targetPath}`);
            }
        }, { once: true });
    }

    loadIndex();
</script>
<script>
    async function initMenu() {
        try {
            const response = await fetch('/menu.json');
            const data = await response.json();

            renderMenu(data);

            console.log("Menu successfully rendered!");
        } catch (error) {
            console.error("Error loading the menu:", error);
        }
    }

    function renderMenu(items) {
        const container = document.getElementById('render-items');
        if (!container) return;

        container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-6 max-w-7xl mx-auto";

        container.innerHTML = items.map(item => `
        <div class="flex flex-col bg-black/70 backdrop-blur-sm border-2 border-red-600 rounded-xl overflow-hidden transform transition hover:scale-105 ${item.available ? '' : 'opacity-75 grayscale'}">
            <div class="relative h-64 w-full">
                <img src="${item.image || '/src/assets/images/MAYDAYZ-FAV.png'}" 
                     class="w-full h-full object-cover" 
                     alt="${item.name}">
                ${!item.available ? `
                    <div class="absolute inset-0 bg-black/60 flex items-center justify-center">
                        <span class="text-white font-bold text-3xl border-4 border-white p-2 rotate-[-10deg]" style="font-family: FontD">SOLD OUT</span>
                    </div>` : ''}
            </div>
            
            <div class="p-6 flex-grow flex flex-col justify-between text-white">
                <div>
                    <h3 class="text-3xl mb-2 text-red-500 uppercase" style="font-family: FontC">${item.name}</h3>
                    <p class="text-sm mb-4 line-clamp-3" style="font-family: FontB">${item.description}</p>
                </div>
                
                <div class="flex items-center justify-between mt-4">
                    <span class="text-2xl font-bold" style="font-family: FontD">$${item.price}</span>
                    ${item.available && item.checkoutUrl
                ? `<a href="${item.checkoutUrl}" target="_blank" class="bg-red-600 hover:bg-white hover:text-red-600 text-white px-6 py-2 rounded-lg font-bold transition uppercase" style="font-family: FontC">Order</a>`
                : `<a href="${'https://maydayzorder.square.site/'}" target="_blank" class="bg-red-600 hover:bg-white hover:text-red-600 text-white px-6 py-2 rounded-lg font-bold transition uppercase" style="font-family: FontC">Order</a>`}
                </div>
            </div>
        </div>
    `).join('');
    }

    initMenu();
</script>
