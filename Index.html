    <script>
        const hidePreloader = () => {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                preloader.classList.add('preloader-hidden');
                setTimeout(() => preloader.remove(), 500);
            }
        };
        window.addEventListener('load', hidePreloader);
        setTimeout(hidePreloader, 3000); 
        function initSmartPreload() {
            const links = [
                { id: "about_button", path: "/src/html/about.html" },
                { id: "menu_button", path: "/src/html/menu.html" },
                { id: "catering_button", path: "/src/html/catering.html" },
                { id: "signup-button", path: "/src/html/login.html" }
            ];
    
            links.forEach(linkData => {
                const btn = document.getElementById(linkData.id);
                if (!btn) return;
    
                // Use 'mouseenter' but ensure it only ever fires ONCE per session
                btn.addEventListener("mouseenter", () => {
                    if (!document.getElementById(`spec-${linkData.id}`)) {
                        const specScript = document.createElement('script');
                        specScript.id = `spec-${linkData.id}`;
                        specScript.type = 'speculationrules';
                        specScript.textContent = JSON.stringify({
                            "prerender": [{ "source": "list", "urls": [linkData.path] }]
                        });
                        document.head.append(specScript);
                    }
                }, { once: true });
            });
        }
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", initSmartPreload);
        } else {
            initSmartPreload();
        }
    </script>
    <script>
        // Clean up any old Service Workers directly from the browser
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) {
              registration.unregister();
              console.log("Old SW killed.");
            }
          });
        }
      
        // Clear caches from the main thread
        if ('caches' in window) {
          caches.keys().then(names => {
            for (let name of names) caches.delete(name);
            console.log("Caches cleared.");
          });
        }
      </script>
    <script>
        async function renderFeaturedItems() {
            try {
                const response = await fetch('/menu.json');
                const allItems = await response.json();

                // Filtering by specific items
                const featuredNames = ["Sampler", "Ribs Plate"];
                const featuredItems = allItems.filter(item =>
                    featuredNames.some(name => item.name.includes(name))
                );

                const container = document.getElementById('featured-container');
                if (!container) return;

                container.innerHTML = featuredItems.map(item => `
            <div class="p-4 group max-w-sm">
                <div class="relative overflow-hidden rounded-2xl border-2 border-transparent transition-all duration-300">
                    <picture>
                        <img src="${item.image || '/src/assets/images/samplerCompressed.webp'}" 
                             alt="${item.name}" 
                             width="350" height="350" 
                             class="rounded-2xl transition-transform duration-500 group-hover:scale-110 ${!item.available ? 'grayscale opacity-50' : ''}">
                    </picture>
                    ${!item.available ? `
                        <div class="absolute inset-0 flex items-center justify-center bg-black/40">
                            <span class="text-white text-2xl font-bold border-2 border-white p-2 rotate-[-5deg]">SOLD OUT</span>
                        </div>
                    ` : ''}
                </div>
                <h3 class="text-white text-2xl mt-4 uppercase">${item.name} - $${item.price}</h3>
                ${item.available && item.checkoutUrl ? `
                    <a href="${item.checkoutUrl}" target="_blank" class="inline-block mt-2 text-red-500 hover:text-white transition-colors uppercase text-sm font-bold tracking-tighter">
                        Order Now &rarr;
                    </a>
                ` : `
                    <a href="${'https://maydayzorder.square.site/'}" target="_blank" class="inline-block mt-2 text-red-500 hover:text-white transition-colors uppercase text-sm font-bold tracking-tighter">
                        Order Now &rarr;
                    </a>
                `}
            </div>
        `).join('');

            } catch (error) {
                console.error("Featured items failed to load:", error);
                document.getElementById('featured-container').innerHTML = ""; // Hide if error
            }
        }

        renderFeaturedItems();
    </script>
